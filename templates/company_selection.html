{% extends "base.html" %}

{% block title %}Select Company - WQA{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='styles/styles.css') }}">
<style>
    .search-container {
        position: relative;
        margin-bottom: 20px;
    }
    .search-input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
    }
    .search-results {
        position: absolute;
        width: 100%;
        max-height: 300px;
        overflow-y: auto;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        z-index: 1000;
        margin-top: 5px;
    }
    .search-item {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
    }
    .search-item:hover {
        background-color: #f5f5f5;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title">Select Company</h4>
                </div>
                <div class="card-body">
                    <form id="companyForm" method="POST" action="{{ url_for('select_company') }}">
                        <div class="mb-3">
                            <label for="companyInput" class="form-label">Search Company</label>
                            <div class="search-container">
                                <input type="text" class="search-input" id="companyInput" placeholder="Enter company name...">
                                <div id="searchResults" class="search-results"></div>
                            </div>
                            <input type="hidden" id="selectedCompanyId" name="company" value="">
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary">Continue to Products</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/company_selection.js') }}"></script>
{% endblock %}
