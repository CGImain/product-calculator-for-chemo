{# Sleek company info bar with change and confirm flow #}
<div id="companyInfoWrapper">
    <!-- Display bar -->
    <div id="companyInfoBar" class="d-flex align-items-center justify-content-between bg-light border rounded px-3 py-2 mb-3">
        <div class="d-flex flex-column">
            <div class="d-flex align-items-center">
                <i class="bi bi-building me-2"></i>
                <span class="fw-semibold" id="companyNameDisplay">{{ session.get('company_name', 'Not selected') }}</span>
            </div>
            {% if session.get('company_email') %}
            <div class="d-flex align-items-center mt-1">
                <i class="bi bi-envelope me-2"></i>
                <small class="text-muted" id="companyEmailDisplay">{{ session.get('company_email', '') }}</small>
            </div>
            {% endif %}
        </div>
        <button class="btn btn-sm btn-outline-primary" id="companyChangeBtn">
            <i class="bi bi-pencil-square me-1"></i> Change
        </button>
    </div>

    <!-- Search box -->
    <div id="companySearchBox" class="mb-3 card shadow-sm" style="display: none;">
        <div class="card-body">
            <h6 class="card-title mb-3">Change Company</h6>
            <div class="position-relative">
                <div class="input-group mb-2">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" id="companySearchInput" 
                           placeholder="Search company by name or email" autocomplete="off">
                </div>
                <div id="companySearchResults" class="search-results mt-1 border rounded" style="display: none;"></div>
            </div>
            <div class="mt-3 d-flex justify-content-end">
                <button class="btn btn-outline-secondary btn-sm me-2" id="companyCancelBtn">
                    <i class="bi bi-x-lg me-1"></i> Cancel
                </button>
                <button class="btn btn-primary btn-sm" id="companyConfirmBtn" disabled>
                    <i class="bi bi-check-lg me-1"></i> Confirm
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Toast container for notifications (will be created by JS if not exists) -->
<div id="toastContainer"></div>

<style>
.search-results {
    position: absolute;
    width: 100%;
    max-height: 200px;
    overflow-y: auto;
    background: white;
    z-index: 1000;
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
}

.search-results .search-item {
    padding: 0.5rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.search-results .search-item:hover {
    background-color: #f8f9fa;
}

.search-results .search-item small {
    display: block;
    font-size: 0.8em;
    color: #6c757d;
}

/* Toast styles */
.toast {
    transition: opacity 0.3s ease-in-out;
    margin-bottom: 0.5rem;
}

.toast:not(.show) {
    opacity: 0;
}
</style>
