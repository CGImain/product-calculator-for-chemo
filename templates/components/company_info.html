{# Company info bar with inline company selection #}
<div id="companyInfoWrapper" class="company-info-wrapper">
    <!-- Display bar -->
    <div id="companyInfoBar" class="d-flex align-items-center justify-content-between bg-light border rounded px-3 py-2 mb-3" style="display: none;">
        <div class="d-flex flex-column w-100">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <i class="fas fa-building me-2 text-primary"></i>
                    <span class="fw-semibold" id="companyNameDisplay"></span>
                </div>
                <button class="btn btn-sm btn-outline-primary" id="toggleSearchBtn">
                    <i class="fas fa-edit me-1"></i> Change
                </button>
            </div>
            <div id="companyInfoContainer" class="d-flex align-items-center mt-1" style="display: none;">
                <i class="fas fa-envelope me-2 text-muted"></i>
                <small class="text-muted" id="companyEmailDisplay"></small>
            </div>
        </div>
    </div>

    <!-- Search box -->
    <div id="companySearchBox" class="mb-3 card shadow-sm" style="display: none;">
        <div class="card-body">
            <h6 class="card-title mb-3">Change Company</h6>
            <div class="position-relative">
                <div class="input-group mb-2">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="companySearchInput" 
                           placeholder="Search company by name or email" autocomplete="off">
                </div>
                <div id="companySearchResults" class="search-results mt-1 border rounded" style="display: none; max-height: 200px; overflow-y: auto;"></div>
            </div>
            <div class="mt-3 d-flex justify-content-end">
                <button class="btn btn-outline-secondary btn-sm me-2" id="companyCancelBtn">
                    <i class="fas fa-times me-1"></i> Cancel
                </button>
                <button class="btn btn-primary btn-sm" id="companyConfirmBtn" disabled>
                    <i class="bi bi-check-lg me-1"></i> Confirm
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Toast container for notifications -->
<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

<script>
// Global variable to store companies data
let companiesData = [];

// Function to safely get company data from storage
function getCompanyData() {
    console.log('Getting company data...');
    
    // First, try to get from the server-side session (if available in the DOM)
    const serverCompanyName = document.getElementById('serverCompanyName')?.textContent.trim();
    const serverCompanyEmail = document.getElementById('serverCompanyEmail')?.textContent.trim();
    const serverCompanyId = document.getElementById('serverCompanyId')?.textContent.trim();
    
    if (serverCompanyName) {
        console.log('Using company data from server session:', { 
            name: serverCompanyName, 
            email: serverCompanyEmail, 
            id: serverCompanyId 
        });
        return {
            name: serverCompanyName,
            email: serverCompanyEmail,
            id: serverCompanyId
        };
    }
    
    // Fall back to client-side storage if server data not available
    let companyName = sessionStorage.getItem('company_name') || sessionStorage.getItem('companyName') || '';
    let companyEmail = sessionStorage.getItem('company_email') || sessionStorage.getItem('companyEmail') || '';
    let companyId = sessionStorage.getItem('company_id') || sessionStorage.getItem('companyId') || '';
    
    // Clean up any 'null' or 'undefined' strings
    companyName = (companyName && companyName !== 'null' && companyName !== 'undefined') ? companyName : '';
    companyEmail = (companyEmail && companyEmail !== 'null' && companyEmail !== 'undefined') ? companyEmail : '';
    companyId = (companyId && companyId !== 'null' && companyId !== 'undefined') ? companyId : '';
    
    console.log('Initial sessionStorage values:', { companyName, companyEmail, companyId });
    
    // If not in sessionStorage, try localStorage
    if (!companyName) {
        console.log('No company name in sessionStorage, checking localStorage...');
        const savedCompany = localStorage.getItem('selectedCompany');
        
        if (savedCompany) {
            try {
                console.log('Found saved company in localStorage:', savedCompany);
                const companyData = typeof savedCompany === 'string' ? JSON.parse(savedCompany) : savedCompany;
                console.log('Parsed company data:', companyData);
                
                // Extract company data with fallbacks
                const extractedName = companyData.name || companyData.company_name || companyData.companyName || '';
                const extractedEmail = companyData.email || companyData.company_email || companyData.companyEmail || '';
                const extractedId = companyData.id || companyData.company_id || companyData.companyId || '';
                
                console.log('Extracted values:', { 
                    name: extractedName, 
                    email: extractedEmail, 
                    id: extractedId 
                });
                
                // Only update if we have valid data
                if (extractedName) {
                    companyName = extractedName;
                    companyEmail = extractedEmail;
                    companyId = extractedId;
                    
                    // Update sessionStorage with consistent keys
                    sessionStorage.setItem('company_name', companyName);
                    sessionStorage.setItem('company_email', companyEmail);
                    sessionStorage.setItem('company_id', companyId);
                    console.log('Updated company data in sessionStorage');
                }
            } catch (e) {
                console.error('Error parsing company data:', e);
            }
        } else {
            console.log('No company data found in localStorage');
        }
    }
    
    // Clean up the final values
    const result = { 
        name: companyName || '', 
        email: companyEmail || '',
        id: companyId || ''
    };
    
    console.log('Returning company data:', result);
    return result;
}

// Function to update company info display
function updateCompanyInfoDisplay() {
    console.log('Updating company info display...');
    const company = getCompanyData();
    
    console.log('Company data for display:', company);
    
    // Get all relevant DOM elements
    const nameDisplay = document.getElementById('companyNameDisplay');
    const emailDisplay = document.getElementById('companyEmailDisplay');
    const companyInfoBar = document.getElementById('companyInfoBar');
    const companyInfoContainer = document.getElementById('companyInfoContainer');
    const toggleSearchBtn = document.getElementById('toggleSearchBtn');
    
    // Only proceed if we have all required elements
    if (!nameDisplay || !emailDisplay || !companyInfoBar || !companyInfoContainer) {
        console.error('One or more required elements not found');
        return;
    }
    
    // Clear existing content
    nameDisplay.textContent = '';
    emailDisplay.textContent = '';
    
    // We always expect to have company data at this point
    if (company.name) {
        console.log('Setting company name to:', company.name);
        
        // Update company name
        nameDisplay.textContent = company.name;
        nameDisplay.title = company.name;
        
        // Update company email if available
        if (company.email) {
            console.log('Setting company email to:', company.email);
            emailDisplay.innerHTML = `<a href="mailto:${company.email}" class="text-muted text-decoration-none">${company.email}</a>`;
            emailDisplay.title = company.email;
            companyInfoContainer.style.display = 'flex';
        } else {
            companyInfoContainer.style.display = 'none';
        }
        
        // Show the company info bar
        companyInfoBar.style.display = 'flex';
        
        // Enable the change button
        if (toggleSearchBtn) {
            toggleSearchBtn.disabled = false;
        }
    } else {
        console.log('No company data available, hiding display');
        // Hide the company info bar when no company is selected
        companyInfoBar.style.display = 'none';
        companyInfoContainer.style.display = 'none';
        
        // Disable the change button
        if (toggleSearchBtn) {
            toggleSearchBtn.disabled = true;
        }
    }
    
    // Also update any customer info sections
    updateCustomerInfoSections(company);
    
    console.log('Finished updating company info display');
}

// Function to update customer info sections with company data
function updateCustomerInfoSections(company) {
    const customerInfoSections = document.querySelectorAll('.customer-info-section');
    customerInfoSections.forEach(section => {
        const nameEl = section.querySelector('.company-name-display');
        const emailEl = section.querySelector('.company-email-display');
        
        if (nameEl) {
            nameEl.textContent = company.name || 'Not selected';
        }
        if (emailEl) {
            emailEl.innerHTML = company.email 
                ? `<a href="mailto:${company.email}">${company.email}</a>` 
                : '';
        }
    });
}

// Function to load companies data
async function loadCompaniesData() {
    try {
        const response = await fetch('/get_companies');
        if (response.ok) {
            companiesData = await response.json();
            // After loading companies, update the display
            updateCompanyInfoDisplay();
            return companiesData;
        }
        console.error('Failed to load companies data');
        return [];
    } catch (error) {
        console.error('Error loading companies data:', error);
        return [];
    }
}

// Function to show search box
function showSearchBox() {
    const searchBox = document.getElementById('companySearchBox');
    const searchInput = document.getElementById('companySearchInput');
    if (searchBox && searchInput) {
        searchBox.style.display = 'block';
        searchInput.focus();
    }
}

// Function to hide search box
function hideSearchBox() {
    const searchBox = document.getElementById('companySearchBox');
    const searchResults = document.getElementById('companySearchResults');
    const searchInput = document.getElementById('companySearchInput');
    
    if (searchBox) searchBox.style.display = 'none';
    if (searchResults) searchResults.style.display = 'none';
    if (searchInput) searchInput.value = '';
}

// Function to render search results
function renderSearchResults(query = '') {
    const searchResults = document.getElementById('companySearchResults');
    if (!searchResults) return;
    
    if (!query.trim()) {
        searchResults.style.display = 'none';
        return;
    }
    
    const queryLower = query.toLowerCase();
    const filtered = companiesData.filter(company => 
        company.name.toLowerCase().includes(queryLower) || 
        (company.email && company.email.toLowerCase().includes(queryLower))
    );
    
    if (filtered.length === 0) {
        searchResults.innerHTML = '<div class="p-2 text-muted">No companies found</div>';
    } else {
        searchResults.innerHTML = filtered.map(company => `
            <div class="search-result-item p-2 border-bottom" 
                 data-id="${company.id}" 
                 data-name="${company.name}" 
                 data-email="${company.email || ''}">
                <div class="fw-semibold">${company.name}</div>
                ${company.email ? `<div class="small text-muted">${company.email}</div>` : ''}
            </div>
        `).join('');
    }
    
    searchResults.style.display = 'block';
    
    // Add click handlers to search result items
    document.querySelectorAll('.search-result-item').forEach(item => {
        item.addEventListener('click', function() {
            const company = {
                id: this.dataset.id,
                name: this.dataset.name,
                email: this.dataset.email
            };
            
            // Update storage
            sessionStorage.setItem('companyName', company.name);
            sessionStorage.setItem('companyEmail', company.email);
            sessionStorage.setItem('companyId', company.id);
            localStorage.setItem('selectedCompany', JSON.stringify(company));
            
            // Update display
            updateCompanyInfoDisplay();
            hideSearchBox();
            
            // Show success message
            showToast('Company updated successfully', 'success');
            
            // Trigger storage event to update other tabs
            window.dispatchEvent(new Event('storage'));
        });
    });
}

// Function to show toast message
function showToast(message, type = 'info') {
    const toastContainer = document.getElementById('toastContainer');
    if (!toastContainer) return;
    
    const toast = document.createElement('div');
    toast.className = `toast show align-items-center text-bg-${type} border-0`;
    toast.role = 'alert';
    toast.setAttribute('aria-live', 'assertive');
    toast.setAttribute('aria-atomic', 'true');
    
    toast.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">
                ${message}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    `;
    
    toastContainer.appendChild(toast);
    
    // Auto remove after 3 seconds
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

// Function to initialize the company info component
async function initializeCompanyInfo() {
    try {
        // First, try to load the company data
        const company = getCompanyData();
        
        // If no company data is found, load companies data
        if (!company || !company.id) {
            await loadCompaniesData();
            // Get the updated company data
            const updatedCompany = getCompanyData();
            if (updatedCompany && updatedCompany.id) {
                updateCompanyInfoDisplay();
            }
        } else {
            // We already have company data, just update the display
            updateCompanyInfoDisplay();
        }
    } catch (error) {
        console.error('Error initializing company info:', error);
        // Still try to update display in case we have partial data
        updateCompanyInfoDisplay();
    }
}

// Initialize the component when DOM is fully loaded
document.addEventListener('DOMContentLoaded', function() {
    // Initialize company info
    initializeCompanyInfo();
    
    // Set up event listeners
    const toggleSearchBtn = document.getElementById('toggleSearchBtn');
    const cancelBtn = document.getElementById('companyCancelBtn');
    const searchInput = document.getElementById('companySearchInput');
    
    if (toggleSearchBtn) {
        toggleSearchBtn.addEventListener('click', showSearchBox);
    }
    
    if (cancelBtn) {
        cancelBtn.addEventListener('click', hideSearchBox);
    }
    
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            renderSearchResults(e.target.value);
        });
    }
    
    // Close search results when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#companySearchBox') && !e.target.closest('#toggleSearchBtn')) {
            hideSearchBox();
        }
    });
    
    // Initial update
    updateCompanyInfoDisplay();
    
    // Also update after a short delay to ensure all scripts are loaded
    setTimeout(updateCompanyInfoDisplay, 100);
});

// Listen for storage events to update when company changes in other tabs
window.addEventListener('storage', function(e) {
    if (e.key === 'companyName' || e.key === 'companyEmail' || e.key === 'companyId' || e.key === 'selectedCompany') {
        updateCompanyInfoDisplay();
    }
});

// Make the function available globally for other scripts
window.updateCompanyInfoDisplay = updateCompanyInfoDisplay;
</script>

<style>
.search-results {
    position: absolute;
    width: 100%;
    max-height: 200px;
    overflow-y: auto;
    background: white;
    z-index: 1000;
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
}

.search-results .search-item {
    padding: 0.5rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.search-results .search-item:hover {
    background-color: #f8f9fa;
}

.search-results .search-item small {
    display: block;
    font-size: 0.8em;
    color: #6c757d;
}

/* Toast styles */
.toast {
    transition: opacity 0.3s ease-in-out;
    margin-bottom: 0.5rem;
}

.toast:not(.show) {
    opacity: 0;
}
</style>
