{# Company info bar with sync between server and client #}
<div id="companyInfoWrapper">
    <!-- Display bar -->
    <div id="companyInfoBar" class="d-flex align-items-center justify-content-between bg-light border rounded px-3 py-2 mb-3">
        <div class="d-flex flex-column">
            <div class="d-flex align-items-center">
                <i class="fas fa-building me-2 text-primary"></i>
                <span class="fw-semibold" id="companyNameDisplay">Loading company...</span>
            </div>
            <div class="d-flex align-items-center mt-1">
                <i class="fas fa-envelope me-2 text-muted"></i>
                <small class="text-muted" id="companyEmailDisplay"></small>
            </div>
        </div>
        <a href="{{ url_for('company_selection') }}" class="btn btn-sm btn-outline-primary" id="companyChangeBtn">
            <i class="fas fa-edit me-1"></i> Change
        </a>
    </div>

    <!-- Search box -->
    <div id="companySearchBox" class="mb-3 card shadow-sm" style="display: none;">
        <div class="card-body">
            <h6 class="card-title mb-3">Change Company</h6>
            <div class="position-relative">
                <div class="input-group mb-2">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" id="companySearchInput" 
                           placeholder="Search company by name or email" autocomplete="off">
                </div>
                <div id="companySearchResults" class="search-results mt-1 border rounded" style="display: none;"></div>
            </div>
            <div class="mt-3 d-flex justify-content-end">
                <button class="btn btn-outline-secondary btn-sm me-2" id="companyCancelBtn">
                    <i class="bi bi-x-lg me-1"></i> Cancel
                </button>
                <button class="btn btn-primary btn-sm" id="companyConfirmBtn" disabled>
                    <i class="bi bi-check-lg me-1"></i> Confirm
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Toast container for notifications -->
<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Function to update company info display
    function updateCompanyInfoDisplay() {
        // Try to get from sessionStorage first
        let companyName = sessionStorage.getItem('companyName');
        let companyEmail = sessionStorage.getItem('companyEmail');
        
        // If not in sessionStorage, try localStorage
        if (!companyName) {
            const savedCompany = localStorage.getItem('selectedCompany');
            if (savedCompany) {
                try {
                    const companyData = JSON.parse(savedCompany);
                    companyName = companyData.name;
                    companyEmail = companyData.email || '';
                    
                    // Update sessionStorage
                    if (companyName) sessionStorage.setItem('companyName', companyName);
                    if (companyEmail) sessionStorage.setItem('companyEmail', companyEmail);
                } catch (e) {
                    console.error('Error parsing company data:', e);
                }
            }
        }
        
        // Update the display
        const nameDisplay = document.getElementById('companyNameDisplay');
        const emailDisplay = document.getElementById('companyEmailDisplay');
        
        if (nameDisplay) {
            nameDisplay.textContent = companyName || 'Not selected';
            nameDisplay.title = companyName || '';
        }
        
        if (emailDisplay) {
            if (companyEmail) {
                emailDisplay.innerHTML = `<a href="mailto:${companyEmail}" class="text-decoration-none">${companyEmail}</a>`;
                emailDisplay.title = companyEmail;
            } else {
                emailDisplay.textContent = 'No email provided';
                emailDisplay.title = '';
            }
        }
    }
    
    // Listen for storage events to update when company changes in other tabs
    window.addEventListener('storage', function(e) {
        if (e.key === 'companyName' || e.key === 'companyEmail' || e.key === 'selectedCompany') {
            updateCompanyInfoDisplay();
        }
    });
    
    // Initial update
    updateCompanyInfoDisplay();
    
    // Also update after a short delay to ensure all scripts are loaded
    setTimeout(updateCompanyInfoDisplay, 500);
});
</script>

<style>
.search-results {
    position: absolute;
    width: 100%;
    max-height: 200px;
    overflow-y: auto;
    background: white;
    z-index: 1000;
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
}

.search-results .search-item {
    padding: 0.5rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.search-results .search-item:hover {
    background-color: #f8f9fa;
}

.search-results .search-item small {
    display: block;
    font-size: 0.8em;
    color: #6c757d;
}

/* Toast styles */
.toast {
    transition: opacity 0.3s ease-in-out;
    margin-bottom: 0.5rem;
}

.toast:not(.show) {
    opacity: 0;
}
</style>
