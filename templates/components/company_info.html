{# Company info bar with inline company selection #}
<div id="companyInfoWrapper" class="company-info-wrapper">
    <!-- Display bar -->
    <div id="companyInfoBar" class="d-flex align-items-center justify-content-between bg-light border rounded px-3 py-2 mb-3" style="display: none;">
        <div class="d-flex flex-column w-100">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <i class="fas fa-building me-2 text-primary"></i>
                    <span class="fw-semibold" id="companyNameDisplay"></span>
                </div>
                <button class="btn btn-sm btn-outline-primary" id="toggleSearchBtn">
                    <i class="fas fa-edit me-1"></i> Change
                </button>
            </div>
            <div id="companyInfoContainer" class="d-flex align-items-center mt-1" style="display: none;">
                <i class="fas fa-envelope me-2 text-muted"></i>
                <small class="text-muted" id="companyEmailDisplay"></small>
            </div>
        </div>
    </div>

    <!-- Search box -->
    <div id="companySearchBox" class="mb-3 card shadow-sm" style="display: none;">
        <div class="card-body">
            <h6 class="card-title mb-3">Change Company</h6>
            <div class="position-relative">
                <div class="input-group mb-2">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="companySearchInput" 
                           placeholder="Search company by name or email" autocomplete="off">
                </div>
                <div id="companySearchResults" class="search-results mt-1 border rounded" style="display: none; max-height: 200px; overflow-y: auto;"></div>
            </div>
            <div class="mt-3 d-flex justify-content-end">
                <button class="btn btn-outline-secondary btn-sm me-2" id="companyCancelBtn">
                    <i class="fas fa-times me-1"></i> Cancel
                </button>
                <button class="btn btn-primary btn-sm" id="companyConfirmBtn" disabled>
                    <i class="bi bi-check-lg me-1"></i> Confirm
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Toast container for notifications -->
<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

<script>
// Global variable to store companies data
let companiesData = [];

// Function to safely get company data from storage
function getCompanyData() {
    console.log('Getting company data...');
    
    // First, try to get data from server-side rendered elements
    const serverCompanyName = document.getElementById('serverCompanyName')?.textContent.trim();
    const serverCompanyEmail = document.getElementById('serverCompanyEmail')?.textContent.trim();
    const serverCompanyId = document.getElementById('serverCompanyId')?.textContent.trim();
    
    console.log('Server company data:', { name: serverCompanyName, email: serverCompanyEmail, id: serverCompanyId });
    
    // If we have server-side data, use it
    if (serverCompanyName || serverCompanyId) {
        console.log('Using server-side company data');
        // Ensure we're not using 'Not selected' as a value
        const companyData = {
            name: serverCompanyName && serverCompanyName !== 'Not selected' ? serverCompanyName : '',
            email: serverCompanyEmail && serverCompanyEmail !== 'Not selected' ? serverCompanyEmail : '',
            id: serverCompanyId && serverCompanyId !== 'Not selected' ? serverCompanyId : ''
        };
        
        // Update session storage with the cleaned data
        sessionStorage.setItem('companyName', companyData.name);
        sessionStorage.setItem('companyEmail', companyData.email);
        sessionStorage.setItem('companyId', companyData.id);
        
        return companyData;
    }
    
    // Otherwise, try to get from sessionStorage
    try {
        const sessionCompanyName = sessionStorage.getItem('companyName');
        const sessionCompanyEmail = sessionStorage.getItem('companyEmail');
        const sessionCompanyId = sessionStorage.getItem('companyId');
        
        console.log('Session storage company data:', { 
            name: sessionCompanyName, 
            email: sessionCompanyEmail, 
            id: sessionCompanyId 
        });
        
        if (sessionCompanyName || sessionCompanyId) {
            console.log('Using session storage company data');
            // Clean the data before using
            const companyData = {
                name: sessionCompanyName && sessionCompanyName !== 'Not selected' ? sessionCompanyName : '',
                email: sessionCompanyEmail && sessionCompanyEmail !== 'Not selected' ? sessionCompanyEmail : '',
                id: sessionCompanyId && sessionCompanyId !== 'Not selected' ? sessionCompanyId : ''
            };
            return companyData;
        }
        
        // Fall back to localStorage
        const storedCompany = localStorage.getItem('selectedCompany');
        if (storedCompany) {
            try {
                const company = JSON.parse(storedCompany);
                console.log('Using localStorage company data:', company);
                // Clean the data before using
                const companyData = {
                    name: (company.name || company['Company Name'] || '').replace('Not selected', '').trim(),
                    email: (company.email || company['EmailID'] || '').replace('Not selected', '').trim(),
                    id: (company.id || '').toString().replace('Not selected', '').trim()
                };
                
                // Update session storage with the cleaned data
                sessionStorage.setItem('companyName', companyData.name);
                sessionStorage.setItem('companyEmail', companyData.email);
                sessionStorage.setItem('companyId', companyData.id);
                
                return companyData;
            } catch (e) {
                console.error('Error parsing company data from localStorage:', e);
                // If there's an error, return empty values
                return { name: '', email: '', id: '' };
            }
        } else {
            console.log('No company data found in localStorage');
            return { name: '', email: '', id: '' };
        }
    } catch (error) {
        console.error('Error accessing storage:', error);
        return { name: '', email: '', id: '' };
    }
    
    // If we get here, no company data was found
    console.log('No valid company data found in any source');
    return { 
        name: companyName || '', 
        email: companyEmail || '',
        id: companyId || ''
    };
    
    console.log('Returning company data:', result);
    return result;
}

// Function to update company info display
function updateCompanyInfoDisplay() {
    console.log('Updating company info display...');
    
    // Force reload company data to ensure we have the latest
    const company = getCompanyData();
    console.log('Company data for display:', company);
    
    // Get all relevant DOM elements
    const nameDisplay = document.getElementById('companyNameDisplay');
    const emailDisplay = document.getElementById('companyEmailDisplay');
    const companyInfoBar = document.getElementById('companyInfoBar');
    const companyInfoContainer = document.getElementById('companyInfoContainer');
    const companyNameEl = document.getElementById('companyName');
    const companyEmailEl = document.getElementById('companyEmail');
    const toggleSearchBtn = document.getElementById('toggleSearchBtn');
    const navCompanyDisplay = document.getElementById('companyNameDisplay');
    
    try {
        // Get the current company data
        const company = getCompanyData();
        console.log('Current company data:', company);
        
        // Check if we have valid company data
        const hasValidCompany = company && (company.name || company.id);
        
        // Update the display based on whether we have company data
        if (hasValidCompany) {
            console.log('Updating display with company data:', company);
            
            // Show the company info bar if it exists
            if (companyInfoBar) {
                companyInfoBar.style.display = 'flex';
            }
            
            // Show the company info container if it exists
            if (companyInfoContainer) {
                companyInfoContainer.style.display = 'block';
            }
            
            // Update the company name display
            if (companyNameEl) {
                const displayName = company.name || 'Company Name Not Available';
                companyNameEl.textContent = displayName;
                companyNameEl.title = displayName; // For tooltip
            }
            
            // Update the company email display
            if (companyEmailEl) {
                if (company.email) {
                    companyEmailEl.innerHTML = `<a href="mailto:${company.email}" class="text-decoration-none">${company.email}</a>`;
                    companyEmailEl.title = company.email;
                } else {
                    companyEmailEl.textContent = 'Email Not Available';
                    companyEmailEl.removeAttribute('title');
                }
            }
            
            // Enable the change button if it exists
            if (toggleSearchBtn) {
                toggleSearchBtn.disabled = false;
                toggleSearchBtn.title = 'Change Company';
            }
            
            // Update the navigation display if it exists
            if (navCompanyDisplay) {
                navCompanyDisplay.textContent = company.name || '';
                navCompanyDisplay.title = company.name || '';
                
                // Ensure the navigation display is visible
                if (navCompanyDisplay.closest('.nav-item')) {
                    navCompanyDisplay.closest('.nav-item').style.display = 'block';
                }
            }
            
            // Update the document title if we're on the home page
            if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
                document.title = company.name ? `${company.name} | Product Calculator` : 'Product Calculator';
            }
            
        } else {
            console.log('No company data available, hiding display');
            
            // Hide the company info bar if it exists
            if (companyInfoBar) {
                companyInfoBar.style.display = 'none';
            }
            
            // Hide the company info container if it exists
            if (companyInfoContainer) {
                companyInfoContainer.style.display = 'none';
            }
            
            // Disable the change button if it exists
            if (toggleSearchBtn) {
                toggleSearchBtn.disabled = true;
                toggleSearchBtn.title = 'Select a company first';
            }
            
            // Clear the navigation display if it exists
            if (navCompanyDisplay) {
                navCompanyDisplay.textContent = '';
                navCompanyDisplay.removeAttribute('title');
            }
        }
        
        // Also update any customer info sections
        updateCustomerInfoSections(company);
        
    } catch (error) {
        console.error('Error updating company info display:', error);
        
        // Ensure UI is in a consistent state even if there's an error
        if (companyInfoBar) companyInfoBar.style.display = 'none';
        if (companyInfoContainer) companyInfoContainer.style.display = 'none';
        if (toggleSearchBtn) toggleSearchBtn.disabled = true;
        if (navCompanyDisplay) {
            navCompanyDisplay.textContent = '';
            navCompanyDisplay.removeAttribute('title');
        }
    }
    
    console.log('Finished updating company info display');
}

// Function to update customer info sections with company data
function updateCustomerInfoSections(company) {
    const customerInfoSections = document.querySelectorAll('.customer-info-section');
    customerInfoSections.forEach(section => {
        const nameEl = section.querySelector('.company-name-display');
        const emailEl = section.querySelector('.company-email-display');
        
        if (nameEl) {
            nameEl.textContent = company.name || '';
        }
        if (emailEl) {
            emailEl.innerHTML = company.email 
                ? `<a href="mailto:${company.email}">${company.email}</a>` 
                : '';
        }
    });
}
async function loadCompaniesData() {
    try {
        console.log('Loading companies data...');
        showToast('Loading companies...', 'info');
        
        const response = await fetch('/get_companies', {
            method: 'GET',
            headers: {
                'Accept': 'application/json',
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
            }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const responseData = await response.json();
        console.log('Server response:', responseData);
        
        // Check if we have a valid response with companies array
        if (!responseData || !responseData.companies || !Array.isArray(responseData.companies)) {
            console.error('Invalid companies data format:', responseData);
            showToast('Error: Invalid companies data format', 'error');
            return [];
        }
        
        console.log(`Received ${responseData.companies.length} companies from server`);
        
        // Process and validate the companies data
        companiesData = responseData.companies.map((company, index) => {
            // Ensure we have valid data
            const id = String(company.id || company._id || index + 1);
            const name = company.name || company['Company Name'] || `Company ${index + 1}`;
            const email = company.email || company['EmailID'] || '';
            
            return { id, name, email };
        });
        
        console.log(`Successfully processed ${companiesData.length} companies`);
        
        // If we have companies, try to pre-select one if none is selected
        if (companiesData.length > 0) {
            const currentCompany = getCompanyData();
            if (!currentCompany || !currentCompany.id) {
                console.log('No company currently selected, selecting first company by default');
                selectCompany(companiesData[0]);
            } else {
                console.log('Company already selected, refreshing display');
                updateCompanyInfoDisplay();
            }
        } else {
            console.warn('No companies available to display');
            showToast('No companies available. Please contact support.', 'warning');
            const errorText = await response.text();
            console.error('Failed to load companies data:', response.status, errorText);
            return [];
        }
    } catch (error) {
        console.error('Error loading companies data:', error);
        return [];
    }
}

// Function to show search box
function showSearchBox() {
    const searchBox = document.getElementById('companySearchBox');
    const searchInput = document.getElementById('companySearchInput');
    if (searchBox && searchInput) {
        searchBox.style.display = 'block';
        searchInput.focus();
    }
}

// Function to hide search box
function hideSearchBox() {
    const searchBox = document.getElementById('companySearchBox');
    const searchResults = document.getElementById('companySearchResults');
    const searchInput = document.getElementById('companySearchInput');
    
    if (searchBox) searchBox.style.display = 'none';
    if (searchResults) searchResults.style.display = 'none';
    if (searchInput) searchInput.value = '';
}

// Function to render search results
function renderSearchResults(query = '') {
    const searchResults = document.getElementById('companySearchResults');
    if (!searchResults) {
        console.error('Search results container not found');
        return;
    }
    
    if (!query.trim()) {
        searchResults.style.display = 'none';
        return;
    }
    
    console.log('Searching for:', query);
    console.log('Total companies in memory:', companiesData.length);
    console.log('Sample companies:', companiesData.slice(0, 3));
    
    const queryLower = query.toLowerCase().trim();
    
    try {
        // Search in both name and email fields
        const filtered = companiesData.filter(company => {
            if (!company) return false;
            
            // Debug info for each company being checked
            const name = company.name || '';
            const email = company.email || '';
            const nameMatch = name.toLowerCase().includes(queryLower);
            const emailMatch = email.toLowerCase().includes(queryLower);
            
            if (nameMatch || emailMatch) {
                console.log('Match found:', { name, email, query: queryLower });
            }
            
            return nameMatch || emailMatch;
        });
        
        console.log(`Found ${filtered.length} matching companies for query: ${query}`);
        
        console.log(`Found ${filtered.length} matching companies`);
        
        if (filtered.length === 0) {
            searchResults.innerHTML = `
                <div class="p-2 text-muted">
                    No companies found for "${query}"
                    <div class="small">Try a different search term</div>
                </div>`;
        } else {
            searchResults.innerHTML = filtered.slice(0, 10).map(company => `
                <div class="search-result-item p-2 border-bottom hover-bg-light" 
                     style="cursor: pointer;"
                     data-id="${company.id || ''}" 
                     data-name="${company.name || ''}" 
                     data-email="${company.email || ''}">
                    <div class="fw-semibold">${company.name || 'Unnamed Company'}</div>
                    ${company.email ? `<div class="small text-muted text-truncate">${company.email}</div>` : ''}
                </div>
            `).join('');
            
            // Add click handlers to search result items
            document.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', function() {
                    const company = {
                        id: this.dataset.id,
                        name: this.dataset.name,
                        email: this.dataset.email
                    };
                    
                    console.log('Company selected:', company);
                    
                    // Update storage
                    sessionStorage.setItem('company_id', company.id);
                    sessionStorage.setItem('company_name', company.name);
                    sessionStorage.setItem('company_email', company.email);
                    
                    // Update display
                    updateCompanyInfoDisplay();
                    
                    // Hide search box
                    hideSearchBox();
                    
                    // Show success message
                    showToast(`Company changed to ${company.name}`, 'success');
                    
                    // Trigger a custom event that other components can listen to
                    const event = new CustomEvent('companyChanged', { detail: company });
                    window.dispatchEvent(event);
                });
                
                // Add hover effect
                item.addEventListener('mouseenter', function() {
                    this.classList.add('bg-light');
                });
                item.addEventListener('mouseleave', function() {
                    this.classList.remove('bg-light');
                });
            });
        }
        
        searchResults.style.display = 'block';
    } catch (error) {
        console.error('Error rendering search results:', error);
        searchResults.innerHTML = `
            <div class="p-2 text-danger">
                Error loading search results. Please try again.
            </div>`;
        searchResults.style.display = 'block';
    }
}

// Rest of the code remains the same
// Function to show toast message
function showToast(message, type = 'info') {
    const toastContainer = document.getElementById('toastContainer');
    if (!toastContainer) return;
    
    const toast = document.createElement('div');
    toast.className = `toast show align-items-center text-bg-${type} border-0`;
    toast.role = 'alert';
    toast.setAttribute('aria-live', 'assertive');
    toast.setAttribute('aria-atomic', 'true');
    
    toast.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">
                ${message}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    `;
    
    toastContainer.appendChild(toast);
    
    // Auto remove after 3 seconds
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

// Function to initialize the company info component
async function initializeCompanyInfo() {
    console.log('Initializing company info component...');
    
    try {
        // First, try to load the company data
        const company = getCompanyData();
        console.log('Initial company data:', company);
        
        // Always update the display first with whatever data we have
        updateCompanyInfoDisplay();
        
        // If no company data is found, try to load companies data
        if (!company || !company.id) {
            console.log('No company data found, loading companies...');
            await loadCompaniesData();
            // Get the updated company data after loading
            const updatedCompany = getCompanyData();
            console.log('Updated company data after load:', updatedCompany);
            
            // Update the display again with the loaded data
            updateCompanyInfoDisplay();
        }
    } catch (error) {
        console.error('Error initializing company info:', error);
        // Still try to update display in case we have partial data
        updateCompanyInfoDisplay();
    }
    
    // Add event listener for storage events to update display when company changes in another tab
    window.addEventListener('storage', function(event) {
        if (event.key === 'company_name' || event.key === 'company_email' || event.key === 'company_id') {
            console.log('Storage event detected, updating company display...');
            updateCompanyInfoDisplay();
        }
    });
    
    // Also update display when page becomes visible again
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
            console.log('Page became visible, updating company display...');
            updateCompanyInfoDisplay();
        }
    });
}

// Initialize the component when DOM is fully loaded
document.addEventListener('DOMContentLoaded', function() {
    // Initialize company info
    initializeCompanyInfo();
    
    // Set up event listeners
    const toggleSearchBtn = document.getElementById('toggleSearchBtn');
    const cancelBtn = document.getElementById('companyCancelBtn');
    const searchInput = document.getElementById('companySearchInput');
    
    if (toggleSearchBtn) {
        toggleSearchBtn.addEventListener('click', showSearchBox);
    }
    
    if (cancelBtn) {
        cancelBtn.addEventListener('click', hideSearchBox);
    }
    
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            renderSearchResults(e.target.value);
        });
    }
    
    // Close search results when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#companySearchBox') && !e.target.closest('#toggleSearchBtn')) {
            hideSearchBox();
        }
    });
    
    // Initial update
    updateCompanyInfoDisplay();
    
    // Also update after a short delay to ensure all scripts are loaded
    setTimeout(updateCompanyInfoDisplay, 100);
});

// Listen for storage events to update when company changes in other tabs
window.addEventListener('storage', function(e) {
    if (e.key === 'companyName' || e.key === 'companyEmail' || e.key === 'companyId' || e.key === 'selectedCompany') {
        updateCompanyInfoDisplay();
    }
});

// Make the function available globally for other scripts
window.updateCompanyInfoDisplay = updateCompanyInfoDisplay;
</script>
